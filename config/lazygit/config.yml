git:
  overrideGpg: true
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --true-color=always
gui:
  border: rounded
  nerdFontsVersion: "3"
  showBottomLine: false
  showIcons: true
  sidePanelWidth: 0.2
  theme:
    selectedLineBgColor:
      - reverse
  wrapLinesInStagingView: false
notARepository: quit
os:
  editPreset: nvim-remote
