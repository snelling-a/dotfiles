"$schema" = "https://starship.rs/config-schema.json"

add_newline         = false
continuation_prompt = "[в–¶в–¶](bright-black)"
format              = """$sudo$status$directory$character"""
right_format        = """$all"""

[battery]
  format         = '\[[$symbol$percentage]($style)\]'
  unknown_symbol = "у°Ӯ‘  "

  [[battery.display]]
    style     = "red"
    threshold = 10

  [[battery.display]]
    style     = "yellow"
    threshold = 20

[directory]
  format           = '\[[$path]($style)[$read_only]($read_only_style)\]'
  home_symbol      = "у°ңҘ"
  read_only        = "о©ө  "
  repo_root_format = '\[[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)\]'

[character]
  error_symbol              = "[оӯ°](red)"
  success_symbol            = "[оӯ°](green)"
  vimcmd_replace_one_symbol = "[оҳ«](purple)"
  vimcmd_replace_symbol     = "[оҳ«](purple)"
  vimcmd_symbol             = "[оҳ«](green)"
  vimcmd_visual_symbol      = "[оҳ«](yellow)"

[git_branch]
  format          = '\[[$symbol$branch]($style)\]'
  ignore_branches = ["main", "master"]
  symbol          = "пҗҳ "

[git_commit]
  commit_hash_length = 6
  format             = '\[[$hash$tag]($style)\]'
  tag_disabled       = false
  tag_max_candidates = 5
  tag_symbol         = " у°“№ "

[git_metrics]
  disabled           = false
  format             = '\[([+$added]($added_style))([-$deleted]($deleted_style))\]'
  only_nonzero_diffs = false

[git_state]
  format = '\[[$state($progress_current/$progress_total)]($style)\]'

[git_status]
  ahead      = "пҒў "
  behind     = "пҒЈ "
  conflicted = "у°ҰҺ "
  deleted    = " пӢ” "
  diverged   = "п‘ғ "
